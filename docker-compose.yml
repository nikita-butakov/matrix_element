version: "3.8"

services:

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    volumes:
      - ./synapse/data:/data
    environment:
      - SYNAPSE_SERVER_NAME=yourdomain.com
      - SYNAPSE_REPORT_STATS=no
    restart: always
    ports:
      - "8008:8008"   # Client API
      - "8448:8448"   # Federation
    networks:
      - matrix

  element:
    image: vectorim/element-web:latest
    container_name: element
    volumes:
      - ./config.json:/app/config.json:ro
    restart: always
    networks:
      - matrix

  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - matrix

  wellknown:
    image: nginx:alpine
    container_name: wellknown
    restart: always
    networks:
      - matrix
    ports:
      - "8080:8080"
    volumes:
      - ./wellknown/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  matrix:

